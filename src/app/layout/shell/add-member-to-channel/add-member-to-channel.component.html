<section
    class="add-member-overlay"
    role="presentation"
    (click)="onClose()"
>
    <article
        class="add-member-popup"
        role="dialog"
        aria-modal="true"
        [attr.aria-label]="'Leute zu ' + channelName + ' hinzufügen'"
        (click)="$event.stopPropagation()"
    >
        <header class="add-member-popup__header">
            <div class="add-member-popup__title-group">
                <h2>Leute hinzufügen</h2>
                <p>
                    <span class="add-member-popup__hash">#</span>
                    <span>{{ channelName }}</span>
                </p>
            </div>

            <button
                type="button"
                class="add-member-popup__close-btn"
                aria-label="Popup schließen"
                (click)="onClose()"
            >
                <img src="assets/pictures/close.svg" alt="" aria-hidden="true" />
            </button>
        </header>

        <div class="add-member-popup__body">
            <input
                #searchInput
                type="text"
                class="add-member-popup__input"
                placeholder="Name eingeben"
                aria-label="Name eingeben"
                autocomplete="off"
                [(ngModel)]="searchValue"
                (input)="onSearchInput()"
                (focus)="onSearchFocus()"
                (blur)="onSearchBlur()"
            />

            @if (showSuggestions) {
                <div class="add-member-popup__suggestions">
                    @for (user of visibleSuggestions; track user.id) {
                        <button
                            type="button"
                            class="add-member-popup__suggestion-item"
                            (click)="onSuggestionSelect(user)"
                        >
                            <div class="add-member-popup__suggestion-avatar-wrap">
                                <img
                                    [src]="user.avatar"
                                    [alt]="user.displayName + ' Avatar'"
                                />
                                <span
                                    class="add-member-popup__suggestion-status"
                                    [class.add-member-popup__suggestion-status--offline]="!user.isOnline"
                                ></span>
                            </div>
                            <span>{{ user.displayName }}</span>
                        </button>
                    }
                </div>
            }

            <div class="add-member-popup__actions">
                <button
                    type="button"
                    class="add-member-popup__submit-btn"
                    (click)="onSubmitClick()"
                    [disabled]="!canSubmitSelection()"
                >
                    Hinzufügen
                </button>
            </div>
        </div>
    </article>
</section>

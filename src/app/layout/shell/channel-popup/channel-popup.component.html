<section class="channel-popup-overlay" (click)="onClose()">
    <article
        class="channel-popup"
        [ngStyle]="{ left: left + 'px', top: top + 'px' }"
        (click)="$event.stopPropagation()"
    >
        <header class="channel-popup__header">
            <div class="channel-popup__title">
                <img src="assets/pictures/hashtag.svg" alt="" aria-hidden="true" />
                <h2>{{ currentChannelName }}</h2>
            </div>

            <button
                type="button"
                class="channel-popup__close-btn"
                (click)="onClose()"
                aria-label="Popup schließen"
            >
                <img src="assets/pictures/close.svg" alt="" aria-hidden="true" />
            </button>
        </header>

        <section
            class="channel-popup__card"
            [class.channel-popup__card--editing]="isEditingChannelName"
        >
            <div class="channel-popup__row">
                <h3>Channel-Name</h3>
                <button
                    type="button"
                    class="channel-popup__edit-btn"
                    (click)="onToggleChannelNameEdit()"
                >
                    {{ isEditingChannelName ? 'Speichern' : 'Bearbeiten' }}
                </button>
            </div>

            @if (!isEditingChannelName) {
                <p class="channel-popup__name">
                    <img
                        src="assets/pictures/hashtag.svg"
                        alt=""
                        aria-hidden="true"
                    />
                    <span>{{ currentChannelName }}</span>
                </p>
            } @else {
                <div class="channel-popup__name-input-wrap">
                    <span class="channel-popup__name-hashtag">#</span>
                    <input
                        type="text"
                        class="channel-popup__name-input"
                        [(ngModel)]="editableChannelName"
                        (keydown.enter)="onToggleChannelNameEdit()"
                    />
                </div>
            }
        </section>

        <section
            class="channel-popup__card"
            [class.channel-popup__card--editing]="isEditingDescription"
        >
            <div class="channel-popup__row">
                <h3>Beschreibung</h3>
                <button
                    type="button"
                    class="channel-popup__edit-btn"
                    (click)="onToggleDescriptionEdit()"
                >
                    {{ isEditingDescription ? 'Speichern' : 'Bearbeiten' }}
                </button>
            </div>

            @if (!isEditingDescription) {
                <p class="channel-popup__description">{{ currentDescription }}</p>
            } @else {
                <div class="channel-popup__description-input-wrap">
                    <input
                        type="text"
                        class="channel-popup__description-input"
                        [(ngModel)]="editableDescription"
                        placeholder="Dein Text hier"
                        (keydown.enter)="onToggleDescriptionEdit()"
                    />
                </div>
            }
            <div class="channel-popup__divider"></div>
            <h4>Erstellt von</h4>
            <p class="channel-popup__creator">{{ createdBy }}</p>
        </section>

        <div class="channel-popup__actions">
            <button type="button" class="channel-popup__leave-btn">Channel verlassen</button>
        </div>
    </article>
</section>
